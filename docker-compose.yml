version: '3.8'

services:
  wa-admin:
    build: .
    container_name: wa-admin
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wa-admin.rule=Host(`wa-admin.infinite-fusion.com`)"
      - "traefik.http.routers.wa-admin.entrypoints=websecure"
      - "traefik.http.routers.wa-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.wa-admin.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
